name: Update Harvest Hands Giving Total

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-giving:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run giving update script
        env:
          OVERFLOW_CLIENT_ID: ${{ secrets.OVERFLOW_CLIENT_ID }}
          OVERFLOW_API_KEY: ${{ secrets.OVERFLOW_API_KEY }}
        run: python update_giving.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto-update: Harvest Hands giving total"
          git push
